plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.36'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    // Add here additional repositories if required by some of the dependencies below.
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

//minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')
//minecraft.accessTransformers.entry public net.minecraft.client.Minecraft textureManager # textureManager

// Default run configurations.
// These can be tweaked, removed, or duplicated as needed.
runs {
    // applies to all the run configs below
    configureEach {
        argument '-mixin.config=splatcraft.mixins.json'

        // Recommended logging data for a userdev environment
        // The markers can be added/remove as needed separated by commas.
        // "SCAN": For mods scan.
        // "REGISTRIES": For firing of registry events.
        // "REGISTRYDUMP": For getting the contents of all registries.
        systemProperty 'forge.logging.markers', 'REGISTRIES'

        // Recommended logging level for the console
        // You can set various levels here.
        // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
        systemProperty 'forge.logging.console.level', 'debug'

        workingDirectory project.layout.projectDirectory.dir('run').dir(name)

        modSource project.sourceSets.main
    }

    client {
        // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    // This run config launches GameTestServer and runs all registered gametests, then exits.
    // By default, the server will crash when no gametests are provided.
    // The gametest system is also enabled by default for other run configs under the /test command.
    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    data {
        // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
        // workingDirectory project.file('run-data')

        // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
        arguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // Specify the version of Minecraft to use.
    // Depending on the plugin applied there are several options. We will assume you applied the userdev plugin as shown above.
    // The group for userdev is net.neoforged, the module name is neoforge, and the version is the same as the neoforge version.
    // You can however also use the vanilla plugin (net.neoforged.gradle.vanilla) to use a version of Minecraft without the neoforge loader.
    // And its provides the option to then use net.minecraft as the group, and one of; client, server or joined as the module name, plus the game version as version.
    // For all intends and purposes: You can treat this dependency as if it is a normal library you would use.
    implementation "net.neoforged:neoforge:${neo_version}"

    // Example optional mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-neoforge-api:${jei_version}"
    // We add the full version to localRuntime, not runtimeOnly, so that we do not publish a dependency on it
    // localRuntime "mezz.jei:jei-${mc_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

tasks.register('validateSplatcraftResources') {
    group = 'verification'
    description = 'Validates Splatcraft registry/resource/data contracts.'

    inputs.dir('src/main/resources')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftItems.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftBlocks.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftBlockEntities.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftEntities.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftMenuTypes.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftCriteriaTriggers.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftStats.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftSounds.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftParticleTypes.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/SplatcraftConfig.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/network/SplatcraftNetwork.java')
    inputs.dir('src/main/java/net/splatcraft/neoforge/network/payload')
    inputs.file('src/main/java/net/splatcraft/neoforge/player/SplatcraftPlayerInfoEvents.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/player/PlayerInfo.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/client/SplatcraftClient.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/client/SubWeaponItemRenderer.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/data/ClientPlayerColors.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/data/InkColorData.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/data/InkColorComponent.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/data/InkOverlayInfo.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/worldink/WorldInk.java')
    inputs.file('src/main/java/net/splatcraft/neoforge/Splatcraft.java')
    inputs.file('src/main/resources/splatcraft.mixins.json')

    def projectDirFile = layout.projectDirectory.asFile
    def resources = layout.projectDirectory.dir('src/main/resources').asFile
    def assetRoot = layout.projectDirectory.dir('src/main/resources/assets/splatcraft').asFile
    def dataRoot = layout.projectDirectory.dir('src/main/resources/data/splatcraft').asFile
    def itemRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftItems.java').asFile
    def blockRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftBlocks.java').asFile
    def blockEntityRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftBlockEntities.java').asFile
    def entityRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftEntities.java').asFile
    def menuRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftMenuTypes.java').asFile
    def criteriaRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftCriteriaTriggers.java').asFile
    def statRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftStats.java').asFile
    def soundRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftSounds.java').asFile
    def particleRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftParticleTypes.java').asFile
    def configFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/SplatcraftConfig.java').asFile
    def networkFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/network/SplatcraftNetwork.java').asFile
    def payloadDir = layout.projectDirectory.dir('src/main/java/net/splatcraft/neoforge/network/payload').asFile
    def playerInfoEventsFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/player/SplatcraftPlayerInfoEvents.java').asFile
    def playerInfoFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/player/PlayerInfo.java').asFile
    def clientFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/client/SplatcraftClient.java').asFile
    def subWeaponRendererFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/client/SubWeaponItemRenderer.java').asFile
    def clientPlayerColorsFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/data/ClientPlayerColors.java').asFile
    def inkColorDataFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/data/InkColorData.java').asFile
    def inkColorComponentFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/data/InkColorComponent.java').asFile
    def inkOverlayInfoFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/data/InkOverlayInfo.java').asFile
    def worldInkFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/worldink/WorldInk.java').asFile
    def modEntryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/Splatcraft.java').asFile
    def mixinsFile = layout.projectDirectory.file('src/main/resources/splatcraft.mixins.json').asFile
    def packMcmetaFile = layout.projectDirectory.file('src/main/resources/pack.mcmeta').asFile
    def blocksAtlasFile = layout.projectDirectory.file('src/main/resources/assets/minecraft/atlases/blocks.json').asFile
    def damageTypeRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftDamageTypes.java').asFile
    def featureRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftFeatures.java').asFile
    def lootFunctionRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftLootFunctions.java').asFile
    def lootModifierRegistryFile = layout.projectDirectory.file('src/main/java/net/splatcraft/neoforge/registry/SplatcraftLootModifiers.java').asFile
    def neoforgeLootModifierFile = layout.projectDirectory.file('src/main/resources/data/neoforge/loot_modifiers/global_loot_modifiers.json').asFile

    doLast {
        def problems = []
        def jsonSlurper = new groovy.json.JsonSlurper()
        def relativePath = { File file ->
            projectDirFile.toPath().relativize(file.toPath()).toString().replace(File.separatorChar, '/' as char)
        }
        def filesRecursive = { File dir, String suffix ->
            def files = []
            if (dir.isDirectory()) {
                dir.eachFileRecurse(groovy.io.FileType.FILES) { File candidate ->
                    if (candidate.name.endsWith(suffix)) {
                        files << candidate
                    }
                }
            }
            files
        }
        def directFiles = { File dir, String suffix ->
            dir.isDirectory()
                    ? dir.listFiles({ File ignored, String name -> name.endsWith(suffix) } as FilenameFilter).toList()
                    : []
        }
        def javaMainRoot = new File(projectDirFile, 'src/main/java')

        def parseJson
        parseJson = { File json ->
            try {
                return jsonSlurper.parse(json)
            } catch (Exception exception) {
                problems << "${relativePath(json)}: invalid JSON: ${exception.message}"
                return null
            }
        }

        filesRecursive(resources, '.json').each { parseJson(it) }

        def configJava = configFile.getText('UTF-8')
        [
                'defineEnum("squidKeyMode", SquidKeyMode.TOGGLE)'       : 'squidKeyMode must keep the original default TOGGLE',
                'define("holdBarrierToRender", false)'                  : 'holdBarrierToRender must keep the original default false',
                'defineEnum("preventBobView", PreventBobView.OFF)'      : 'preventBobView must keep the original default OFF',
                'public enum PreventBobView'                            : 'preventBobView must keep the original three-state enum'
        ].each { needle, message ->
            if (!configJava.contains(needle)) {
                problems << message
            }
        }
        filesRecursive(new File(javaMainRoot, 'net/splatcraft/neoforge'), '.java').each { javaFile ->
            def normalizedPath = relativePath(javaFile)
            if (normalizedPath.contains('/client/') || normalizedPath.contains('/mixin/')) {
                return
            }
            def javaText = javaFile.getText('UTF-8')
            [
                    'net.splatcraft.neoforge.client.',
                    'net.minecraft.client',
                    'com.mojang.blaze3d',
                    'org.lwjgl'
            ].each { forbidden ->
                if (javaText.contains(forbidden)) {
                    problems << "${normalizedPath} must not reference client-only API ${forbidden}"
                }
            }
        }
        def modEntryJava = modEntryFile.getText('UTF-8')
        directFiles(new File(javaMainRoot, 'net/splatcraft/neoforge/registry'), '.java').each { registryFile ->
            def registryJava = registryFile.getText('UTF-8')
            if (!registryJava.contains('register(IEventBus')) {
                return
            }
            def registryClass = registryFile.name.substring(0, registryFile.name.length() - '.java'.length())
            if (!modEntryJava.contains("${registryClass}.register(modEventBus)")) {
                problems << "${relativePath(registryFile)} defines register(IEventBus) but ${relativePath(modEntryFile)} does not call it"
            }
        }
        def mixinsJson = parseJson(mixinsFile)
        if (mixinsJson instanceof Map) {
            ['mixins', 'client'].each { section ->
                def mixinNames = mixinsJson[section]
                if (!(mixinNames instanceof Iterable)) {
                    return
                }
                mixinNames.each { mixinName ->
                    def mixinFile = new File(javaMainRoot, "net/splatcraft/neoforge/mixin/${mixinName.toString().replace('.', '/')}.java")
                    if (!mixinFile.isFile()) {
                        problems << "${relativePath(mixinsFile)} ${section} entry ${mixinName} does not have a matching Java source"
                    }
                }
            }
        }

        def packMeta = parseJson(packMcmetaFile)
        if (packMeta instanceof Map) {
            def pack = packMeta.pack
            if (!(pack instanceof Map) || pack.pack_format != 34) {
                problems << "src/main/resources/pack.mcmeta must declare pack_format 34 for Minecraft 1.21.1"
            }
        }

        def blocksAtlas = parseJson(blocksAtlasFile)
        def blockAtlasDirectories = [] as Set
        if (blocksAtlas instanceof Map && blocksAtlas.sources instanceof Iterable) {
            blocksAtlas.sources.each { source ->
                def type = source instanceof Map ? source.type?.toString() : null
                if (type == 'directory' || type == 'minecraft:directory') {
                    blockAtlasDirectories.add("${source.source}|${source.prefix}".toString())
                }
            }
        }
        [
                'block|block/',
                'item|item/',
                'blocks|blocks/',
                'items|items/',
                'weapons|weapons/',
                'models|models/',
                'particle|particle/',
                'gui/icons|gui/icons/'
        ].each { atlasDirectory ->
            if (!blockAtlasDirectories.contains(atlasDirectory)) {
                problems << "${relativePath(blocksAtlasFile)} must include atlas directory ${atlasDirectory}"
            }
        }

        def itemJava = itemRegistryFile.getText('UTF-8')
        def itemNames = new LinkedHashSet<String>()
        def itemPattern = /\b(?:simple|filter|weapon|hiddenWeapon|subWeapon|hiddenSubWeapon|inkTank|coloredArmor|blockItem|coloredBlockItem|turfScanner|inkDisruptor|colorChanger|squidBumper|powerEggCan|blueprint|inkBand|waxApplicator)\("([^"]+)"/
        (itemJava =~ itemPattern).each { match -> itemNames.add(match[1]) }
        def registeredMainWeaponNames = new LinkedHashSet<String>()
        (itemJava =~ /\b(?:weapon|hiddenWeapon)\("([^"]+)"/).each { match -> registeredMainWeaponNames.add(match[1]) }
        def registeredSubWeaponNames = new LinkedHashSet<String>()
        (itemJava =~ /\b(?:subWeapon|hiddenSubWeapon)\("([^"]+)"/).each { match -> registeredSubWeaponNames.add(match[1]) }

        def itemTagDir = new File(dataRoot, 'tags/item')
        def collectItemTagValues
        collectItemTagValues = { String tagName, Set<String> seen ->
            if (!seen.add(tagName)) {
                return [] as Set
            }
            def tagFile = new File(itemTagDir, "${tagName}.json")
            if (!tagFile.isFile()) {
                problems << "Missing item tag file data/splatcraft/tags/item/${tagName}.json"
                return [] as Set
            }
            def tagJson = parseJson(tagFile)
            def values = new LinkedHashSet<String>()
            if (!(tagJson instanceof Map) || !(tagJson.values instanceof Iterable)) {
                problems << "${relativePath(tagFile)} must define a values array"
                return values
            }
            tagJson.values.each { value ->
                def text = value?.toString()
                if (text?.startsWith('#splatcraft:')) {
                    values.addAll(collectItemTagValues(text.substring('#splatcraft:'.length()), new LinkedHashSet<String>(seen)))
                } else if (text?.startsWith('splatcraft:')) {
                    values.add(text.substring('splatcraft:'.length()))
                }
            }
            return values
        }
        def taggedMainWeaponNames = collectItemTagValues('main_weapons', new LinkedHashSet<String>())
        def missingMainWeaponTags = registeredMainWeaponNames.findAll { !taggedMainWeaponNames.contains(it) }.sort()
        if (!missingMainWeaponTags.isEmpty()) {
            problems << "Registered main weapons missing from main weapon item tags: ${missingMainWeaponTags.join(', ')}"
        }
        def staleMainWeaponTags = taggedMainWeaponNames.findAll { !registeredMainWeaponNames.contains(it) }.sort()
        if (!staleMainWeaponTags.isEmpty()) {
            problems << "Main weapon item tags reference unregistered weapons: ${staleMainWeaponTags.join(', ')}"
        }
        def mainWeaponClassTagEntries = []
        ['shooters', 'rollers', 'brushes', 'chargers', 'dualies', 'sloshers', 'blasters', 'splatlings'].each { tagName ->
            def tagFile = new File(itemTagDir, "${tagName}.json")
            def tagJson = parseJson(tagFile)
            if (tagJson instanceof Map && tagJson.values instanceof Iterable) {
                tagJson.values.each { value ->
                    def text = value?.toString()
                    if (text?.startsWith('splatcraft:')) {
                        mainWeaponClassTagEntries << text.substring('splatcraft:'.length())
                    }
                }
            }
        }
        def duplicateMainWeaponTags = mainWeaponClassTagEntries
                .groupBy { it }
                .findAll { ignored, entries -> entries.size() > 1 }
                .keySet()
                .sort()
        if (!duplicateMainWeaponTags.isEmpty()) {
            problems << "Main weapon item tags contain duplicate concrete entries: ${duplicateMainWeaponTags.join(', ')}"
        }

        def itemModelNames = directFiles(new File(assetRoot, 'models/item'), '.json').collect {
            it.name.substring(0, it.name.length() - '.json'.length())
        } as Set
        def missingItemModels = itemNames.findAll { !itemModelNames.contains(it) }.sort()
        if (!missingItemModels.isEmpty()) {
            problems << "Registered items without item models: ${missingItemModels.join(', ')}"
        }

        def blockJava = blockRegistryFile.getText('UTF-8')
        def blockNames = new LinkedHashSet<String>()
        (blockJava =~ /BLOCKS\.register\("([^"]+)"/).each { match -> blockNames.add(match[1]) }
        (blockJava =~ /\bblock\("([^"]+)"/).each { match -> blockNames.add(match[1]) }

        def blockEntityJava = blockEntityRegistryFile.getText('UTF-8')
        def blockEntityNames = new LinkedHashSet<String>()
        (blockEntityJava =~ /\bregister\(\s*"([^"]+)"/).each { match -> blockEntityNames.add(match[1]) }
        def expectedBlockEntities = [
                'color',
                'inked_block',
                'crate',
                'stage_barrier',
                'color_barrier',
                'ink_vat',
                'remote_pedestal',
                'spawn_pad'
        ] as Set
        def missingBlockEntities = expectedBlockEntities.findAll { !blockEntityNames.contains(it) }.sort()
        if (!missingBlockEntities.isEmpty()) {
            problems << "Missing migrated block entity registrations: ${missingBlockEntities.join(', ')}"
        }
        def extraBlockEntities = blockEntityNames.findAll { !expectedBlockEntities.contains(it) }.sort()
        if (!extraBlockEntities.isEmpty()) {
            problems << "Unexpected block entity registrations: ${extraBlockEntities.join(', ')}"
        }

        def menuJava = menuRegistryFile.getText('UTF-8')
        def menuNames = new LinkedHashSet<String>()
        (menuJava =~ /MENU_TYPES\.register\("([^"]+)"/).each { match -> menuNames.add(match[1]) }
        def expectedMenus = ['ink_vat', 'weapon_workbench'] as Set
        def missingMenus = expectedMenus.findAll { !menuNames.contains(it) }.sort()
        if (!missingMenus.isEmpty()) {
            problems << "Missing migrated menu registrations: ${missingMenus.join(', ')}"
        }
        def extraMenus = menuNames.findAll { !expectedMenus.contains(it) }.sort()
        if (!extraMenus.isEmpty()) {
            problems << "Unexpected menu registrations: ${extraMenus.join(', ')}"
        }

        def registeredNames = { File source, String pattern ->
            def names = new LinkedHashSet<String>()
            (source.getText('UTF-8') =~ pattern).each { match -> names.add(match[1]) }
            names
        }
        def damageTypeNames = registeredNames(damageTypeRegistryFile, /create\("([^"]+)"/)
        def featureNames = registeredNames(featureRegistryFile, /FEATURES\.register\("([^"]+)"/)
        def lootFunctionNames = registeredNames(lootFunctionRegistryFile, /LOOT_FUNCTIONS\.register\("([^"]+)"/)
        def lootModifierTypes = registeredNames(lootModifierRegistryFile, /SERIALIZERS\.register\("([^"]+)"/)
        def toConstantName = { String name -> name.replace('-', '_').toUpperCase(Locale.ROOT) }

        def entityJava = entityRegistryFile.getText('UTF-8')
        def entityNames = new LinkedHashSet<String>()
        (entityJava =~ /\b(?:inkSquid|projectile|squidBumper|spawnShield|subWeapon)\("([^"]+)"/).each { match -> entityNames.add(match[1]) }
        def clientSource = clientFile.getText('UTF-8')
        if (!clientSource.contains('WorldInkRenderer::onRenderLevelStage')) {
            problems << "WorldInkRenderer is not registered on the client event bus"
        }
        [
                'STAGE_BARRIER'   : 'StageBarrierRenderer::new',
                'COLOR_BARRIER'   : 'StageBarrierRenderer::new',
                'REMOTE_PEDESTAL' : 'RemotePedestalRenderer::new'
        ].each { blockEntityConstant, rendererFactory ->
            if (!clientSource.contains("registerBlockEntityRenderer(SplatcraftBlockEntities.${blockEntityConstant}.get(), ${rendererFactory})")) {
                problems << "Block entity renderer for ${blockEntityConstant} is not registered"
            }
        }
        [
                'INK_VAT'          : 'InkVatScreen::new',
                'WEAPON_WORKBENCH' : 'WeaponWorkbenchScreen::new'
        ].each { menuConstant, screenFactory ->
            if (!clientSource.contains("event.register(SplatcraftMenuTypes.${menuConstant}.get(), ${screenFactory})")) {
                problems << "Menu screen for ${menuConstant} is not registered"
            }
        }
        entityNames.each { name ->
            def constant = toConstantName(name)
            if (!clientSource.contains("registerEntityRenderer(SplatcraftEntities.${constant}.get()")) {
                problems << "Entity ${name} is missing a client renderer registration"
            }
        }

        def criteriaJava = criteriaRegistryFile.getText('UTF-8')
