        def missingCriteriaRegistrations = advancementTriggerNames.findAll { !criteriaNames.contains(it) }.sort()
        if (!missingCriteriaRegistrations.isEmpty()) {
            problems << "Advancements reference unregistered Splatcraft criteria: ${missingCriteriaRegistrations.join(', ')}"
        }
        def unusedCriteriaRegistrations = criteriaNames.findAll { !advancementTriggerNames.contains(it) }.sort()
        if (!unusedCriteriaRegistrations.isEmpty()) {
            problems << "Registered Splatcraft criteria are not referenced by advancements: ${unusedCriteriaRegistrations.join(', ')}"
        }

        def networkJava = networkFile.getText('UTF-8')
