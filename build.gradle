            def json = parseJson(model)
            if (json == null) {
                return
            }
            def parentRefs = new LinkedHashSet<String>()
            collectParentRefs(json, parentRefs)
            parentRefs.each { parent ->
                if (!modelFileExists(parent)) {
                    problems << "${relativePath(model)} references missing parent model ${parent}"
                }
            }
            def refs = new LinkedHashSet<String>()
            collectTextureRefs(json, model, refs)
            refs.findAll { !it.startsWith('#') }.each { ref ->
                if (!textureFileExists(ref)) {
                    problems << "${relativePath(model)} references missing texture ${ref}"
                } else if (!textureInBlocksAtlas(ref)) {
                    problems << "${relativePath(model)} references texture ${ref}, but its directory is not included in assets/minecraft/atlases/blocks.json"
                }
            }
        }

