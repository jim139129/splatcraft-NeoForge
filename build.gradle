        def resourceFileExists = { String id, String defaultNamespace, String defaultSuffix ->
            def namespace = defaultNamespace
            def path = id
            if (id.contains(':')) {
                def split = id.split(':', 2)
                namespace = split[0]
                path = split[1]
            }
            if (namespace != 'splatcraft') {
                return true
            }
            def suffix = path.endsWith(defaultSuffix) ? '' : defaultSuffix
            return new File(assetRoot, "${path}${suffix}").isFile()
        }
        def textureFileExists = { String id ->
            def namespace = 'splatcraft'
            def path = id
            if (id.contains(':')) {
                def split = id.split(':', 2)
                namespace = split[0]
                path = split[1]
            }
            if (namespace != 'splatcraft') {
                return true
            }
            def suffix = path.endsWith('.png') ? '' : '.png'
            return new File(assetRoot, "textures/${path}${suffix}").isFile()
        }
        def modelFileExists = { String id ->
            if (id == 'builtin/entity') {
                return true
            }
            def namespace = 'minecraft'
            def path = id
            if (id.contains(':')) {
                def split = id.split(':', 2)
                namespace = split[0]
                path = split[1]
            }
            if (namespace != 'splatcraft') {
                return true
            }
            return new File(assetRoot, "models/${path}.json").isFile()
        }
        def soundFileExists = { String id ->
            def namespace = 'minecraft'
            def path = id
            if (id.contains(':')) {
                def split = id.split(':', 2)
                namespace = split[0]
                path = split[1]
            }
            if (namespace != 'splatcraft') {
                return true
            }
            def suffix = path.endsWith('.ogg') ? '' : '.ogg'
            return new File(assetRoot, "sounds/${path}${suffix}").isFile()
        }
        def textureInBlocksAtlas = { String id ->
            def namespace = 'splatcraft'
            def path = id
            if (id.contains(':')) {
                def split = id.split(':', 2)
                namespace = split[0]
                path = split[1]
            }
            if (namespace != 'splatcraft') {
                return true
            }
            return blockAtlasDirectories.any { atlasDirectory ->
                def parts = atlasDirectory.split(/\|/, 2)
                parts.length == 2 && path.startsWith(parts[1])
            }
        }

        def collectTextureRefs
        collectTextureRefs = { Object node, File source, Set<String> refs ->
            if (node instanceof Map) {
                node.each { key, value ->
                    if (key == 'textures' && value instanceof Map) {
                        value.values().findAll { it instanceof String }.each { refs.add(it) }
                    } else if (key == 'particle' && value instanceof String) {
                        refs.add(value)
                    } else if (key == 'texture' && value instanceof String) {
                        refs.add(value)
                    }
                    collectTextureRefs(value, source, refs)
                }
            } else if (node instanceof Iterable) {
                node.each { collectTextureRefs(it, source, refs) }
            }
        }

        def collectParentRefs
        collectParentRefs = { Object node, Set<String> refs ->
            if (node instanceof Map) {
                node.each { key, value ->
                    if (key == 'parent' && value instanceof String) {
                        refs.add(value)
                    }
                    collectParentRefs(value, refs)
                }
            } else if (node instanceof Iterable) {
                node.each { collectParentRefs(it, refs) }
            }
        }

