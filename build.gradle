        def countFiles = { File dir -> directFiles(dir, '.json').size() }
        [
                'weapon workbench tabs' : [new File(recipeDir, 'weapon_workbench_tabs'), 10],
                'weapon workbench recipes': [new File(recipeDir, 'weapon_workbench'), 40],
                'ink vat color recipes' : [new File(recipeDir, 'ink_vat_colors'), 59],
                'weapon settings'       : [weaponSettingsDir, 35]
        ].each { label, tuple ->
            def actual = countFiles(tuple[0] as File)
            def expected = tuple[1] as int
            if (actual != expected) {
                problems << "Expected ${expected} ${label}, found ${actual}"
            }
        }

        def weaponSettingsIds = new LinkedHashSet<String>()
        def weaponPattern = /\b(?:weapon|hiddenWeapon|subWeapon|hiddenSubWeapon)\("([^"]+)",\s*"([^"]+)"/
        (itemJava =~ weaponPattern).each { match -> weaponSettingsIds.add(match[2]) }
        def settingsFiles = directFiles(weaponSettingsDir, '.json')
        def settingsFileNames = settingsFiles.collect {
            it.name.substring(0, it.name.length() - '.json'.length())
        } as Set
        def missingSettings = weaponSettingsIds.findAll { !settingsFileNames.contains(it) }.sort()
        if (!missingSettings.isEmpty()) {
            problems << "Weapon items reference missing weapon settings: ${missingSettings.join(', ')}"
        }

        settingsFiles.each { settingsFile ->
            def json = parseJson(settingsFile)
            if (!(json instanceof Map) || !(json.type instanceof String)) {
                problems << "${relativePath(settingsFile)} must define a string type"
            }
        }

        def tabFiles = directFiles(new File(recipeDir, 'weapon_workbench_tabs'), '.json')
        def tabIds = tabFiles.collect {
            "splatcraft:weapon_workbench_tabs/${it.name.substring(0, it.name.length() - '.json'.length())}".toString()
        } as Set
        tabFiles.each { tabFile ->
            def json = parseJson(tabFile)
            if (!(json instanceof Map)) {
                return
            }
            if (!(json.icon instanceof String)) {
                problems << "${relativePath(tabFile)} must define an icon"
            } else if (!resourceFileExists(json.icon, 'splatcraft', '.png') && !itemNames.contains(json.icon.replace('splatcraft:', ''))) {
                problems << "${relativePath(tabFile)} references missing icon ${json.icon}"
            }
        }

        directFiles(new File(recipeDir, 'weapon_workbench'), '.json').each { recipeFile ->
            def json = parseJson(recipeFile)
            if (!(json instanceof Map)) {
                return
            }
            if (!tabIds.contains(json.tab?.toString())) {
                problems << "${relativePath(recipeFile)} references missing tab ${json.tab}"
            }
            if (!(json.recipes instanceof Iterable) || json.recipes.isEmpty()) {
                problems << "${relativePath(recipeFile)} must define at least one subtype recipe"
                return
            }
            json.recipes.each { subtype ->
                def resultId = subtype?.result?.id
                if (!(resultId instanceof String) || !resultId.startsWith('splatcraft:') || !itemNames.contains(resultId.substring('splatcraft:'.length()))) {
                    problems << "${relativePath(recipeFile)} references missing result item ${resultId}"
                }
                def advancement = subtype?.advancement
                if (advancement instanceof String && advancement.startsWith('splatcraft:')) {
                    def path = advancement.substring('splatcraft:'.length())
                    if (!new File(dataRoot, "advancement/${path}.json").isFile()) {
                        problems << "${relativePath(recipeFile)} references missing advancement ${advancement}"
                    }
                }
                if (!(subtype?.ingredients instanceof Iterable) || subtype.ingredients.isEmpty()) {
                    problems << "${relativePath(recipeFile)} subtype ${resultId} must define ingredients"
                }
                subtype?.ingredients?.each { ingredient ->
                    def ingredientId = ingredient?.item
                    if (ingredientId instanceof String && ingredientId.startsWith('splatcraft:') && !itemNames.contains(ingredientId.substring('splatcraft:'.length()))) {
                        problems << "${relativePath(recipeFile)} references missing ingredient item ${ingredientId}"
                    }
                    if (!(ingredient?.count instanceof Number) || ingredient.count <= 0) {
                        problems << "${relativePath(recipeFile)} has invalid ingredient count for ${ingredientId}"
                    }
                }
            }
        }

        def lootModifiersRoot = new File(dataRoot, 'loot_modifiers')
        directFiles(lootModifiersRoot, '.json').each { modifierFile ->
            def json = parseJson(modifierFile)
            if (!(json instanceof Map)) {
                return
            }
            def type = json.type?.toString()
            if (!(type?.startsWith('splatcraft:')) || !lootModifierTypes.contains(type.substring('splatcraft:'.length()))) {
                problems << "${relativePath(modifierFile)} references missing loot modifier type ${type}"
            }
        }

        filesRecursive(new File(dataRoot, 'loot_table'), '.json').each { lootTableFile ->
            def json = parseJson(lootTableFile)
            def visitLoot
            visitLoot = { Object node ->
                if (node instanceof Map) {
                    def function = node.function?.toString()
                    if (function?.startsWith('splatcraft:') && !lootFunctionNames.contains(function.substring('splatcraft:'.length()))) {
                        problems << "${relativePath(lootTableFile)} references missing loot function ${function}"
                    }
                    node.values().each { visitLoot(it) }
                } else if (node instanceof Iterable) {
                    node.each { visitLoot(it) }
                }
            }
            visitLoot(json)
        }

        def globalLootModifiers = parseJson(neoforgeLootModifierFile)
        if (globalLootModifiers instanceof Map && globalLootModifiers.entries instanceof Iterable) {
            globalLootModifiers.entries.each { id ->
                if (id instanceof String && id.startsWith('splatcraft:')) {
                    def path = id.substring('splatcraft:'.length())
                    if (!new File(lootModifiersRoot, "${path}.json").isFile()) {
                        problems << "global_loot_modifiers references missing modifier ${id}"
                    }
                }
            }
        }

        def configuredFeatures = directFiles(new File(dataRoot, 'worldgen/configured_feature'), '.json').collect {
            it.name.substring(0, it.name.length() - '.json'.length())
        } as Set
        def placedFeatures = directFiles(new File(dataRoot, 'worldgen/placed_feature'), '.json').collect {
            it.name.substring(0, it.name.length() - '.json'.length())
        } as Set
        def missingFeatureData = featureNames.findAll { !configuredFeatures.contains(it) && it != 'crate' }.sort()
        if (!missingFeatureData.isEmpty()) {
            problems << "Registered features without configured feature data: ${missingFeatureData.join(', ')}"
        }
        directFiles(new File(dataRoot, 'worldgen/configured_feature'), '.json').each { configuredFile ->
            def json = parseJson(configuredFile)
            def type = json?.type?.toString()
            if (type?.startsWith('splatcraft:') && !featureNames.contains(type.substring('splatcraft:'.length()))) {
                problems << "${relativePath(configuredFile)} references missing feature type ${type}"
            }
        }
        directFiles(new File(dataRoot, 'worldgen/placed_feature'), '.json').each { placedFile ->
            def json = parseJson(placedFile)
            def feature = json?.feature?.toString()
            if (feature?.startsWith('splatcraft:') && !configuredFeatures.contains(feature.substring('splatcraft:'.length()))) {
                problems << "${relativePath(placedFile)} references missing configured feature ${feature}"
            }
        }
        [
                'crate_small'       : 16,
                'crate_large'       : 28,
                'sardinium_deposit' : 32
        ].each { name, chance ->
            def placedFile = new File(dataRoot, "worldgen/placed_feature/${name}.json")
            def json = parseJson(placedFile)
            def placement = json instanceof Map ? json.placement : null
            if (!(placement instanceof Iterable)) {
                problems << "${relativePath(placedFile)} must define placement modifiers"
                return
            }
            def rarity = placement.find { it instanceof Map && it.type?.toString() == 'minecraft:rarity_filter' }
            if (!(rarity instanceof Map) || rarity.chance != chance) {
                problems << "${relativePath(placedFile)} must keep original ocean generation rarity ${chance}"
            }
            def heightmap = placement.find { it instanceof Map && it.type?.toString() == 'minecraft:heightmap' }
            if (!(heightmap instanceof Map) || heightmap.heightmap?.toString() != 'OCEAN_FLOOR_WG') {
                problems << "${relativePath(placedFile)} must use OCEAN_FLOOR_WG placement"
            }
            if (!placement.any { it instanceof Map && it.type?.toString() == 'minecraft:in_square' }) {
                problems << "${relativePath(placedFile)} must spread in chunk squares"
            }
            if (!placement.any { it instanceof Map && it.type?.toString() == 'minecraft:biome' }) {
                problems << "${relativePath(placedFile)} must include the biome placement filter"
            }
        }
        def biomeModifierDir = new File(dataRoot, 'neoforge/biome_modifier')
        filesRecursive(biomeModifierDir, '.json').each { modifierFile ->
            def json = parseJson(modifierFile)
            if (modifierFile.name == 'add_ocean_features.json') {
                if (json?.type?.toString() != 'neoforge:add_features') {
                    problems << "${relativePath(modifierFile)} must use neoforge:add_features"
                }
                if (json?.biomes?.toString() != '#minecraft:is_ocean') {
                    problems << "${relativePath(modifierFile)} must target #minecraft:is_ocean"
                }
                if (json?.step?.toString() != 'underground_ores') {
                    problems << "${relativePath(modifierFile)} must inject ocean features at underground_ores"
                }
            }
            def features = json instanceof Map ? json.features : null
            if (features instanceof Iterable) {
                features.each { feature ->
                    def id = feature?.toString()
                    if (id?.startsWith('splatcraft:') && !placedFeatures.contains(id.substring('splatcraft:'.length()))) {
                        problems << "${relativePath(modifierFile)} references missing placed feature ${id}"
                    }
                }
            }
        }

        if (!problems.isEmpty()) {
            throw new GradleException("Splatcraft resource validation failed:\n - " + problems.join('\n - '))
        }

        println "Validated Splatcraft resources: ${itemNames.size()} items, ${blockNames.size()} blocks, ${blockEntityNames.size()} block entities, ${menuNames.size()} menus, ${entityNames.size()} entities, ${criteriaNames.size()} criteria, ${settingsFiles.size()} weapon settings."
    }
}

tasks.named('check') {
    dependsOn tasks.named('validateSplatcraftResources')
}

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url = layout.projectDirectory.dir('repo').asFile.toURI()
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                'MixinConfigs': 'splatcraft.mixins.json'
        ])
    }
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
